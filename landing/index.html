<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hachure — Hex Map Editor</title>
  <meta name="description" content="Build printable hex maps from real geodata, blank grids, or traced references. Exports a print-ready PDF.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: #f4f0e6;
      font-family: 'Inter', system-ui, sans-serif;
      color: #2a2520;
    }

    /* Top bar */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 20px 28px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      z-index: 1;
    }

    .version {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #b5ada1;
      letter-spacing: 1.5px;
    }

    /* Main content */
    .main {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Mountain illustration */
    .hero-mountain {
      width: 480px;
      max-width: 90vw;
      mix-blend-mode: multiply;
      display: block;
      margin-bottom: -52px;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 108px;
      font-weight: 400;
      color: #2a2520;
      line-height: 1.0;
      margin: 0 0 14px 0;
      letter-spacing: -1px;
      position: relative;
    }

    .tagline {
      font-size: 13px;
      color: #7d756a;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-weight: 500;
      margin: 0 0 32px 0;
    }

    .coming-soon {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #b5ada1;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }


    /* Responsive */
    @media (max-width: 700px) {
      h1 { font-size: 72px; }
      .hero-mountain { margin-bottom: -36px; }
      .footer-stats { display: none; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <span class="version">V0.1</span>
  </header>

  <main class="main">
    <img src="mountains.png" alt="" class="hero-mountain">
    <h1>Hachure</h1>
    <p class="tagline">Wargaming Hex Maps Made Easy</p>
    <p class="coming-soon">Coming Soon</p>
  </main>


</body>
</html>
